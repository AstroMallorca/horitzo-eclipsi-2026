<script type="module">
import { HorizonEngine } from "./data/horizon_engine.js";

console.error("🚨 VISOR NOU CARREGAT");

const engine = new HorizonEngine({
  tileZoom: 13,
  observerHeightM: 1.7,
  refractionK: 0.13,
  tileOptions: { maxTiles: 640 }
});

function getParam(name, fallback = null){
  const p = new URLSearchParams(location.search);
  const v = p.get(name);
  return (v == null || v === "") ? fallback : v;
}

function numParam(name, fallback = null){
  const v = getParam(name, null);
  if (v == null) return fallback;
  const x = parseFloat(String(v).replace(",", "."));
  return Number.isFinite(x) ? x : fallback;
}

const PARAMS = {
  lat: numParam("lat", 39.5733),
  lon: numParam("lon", 2.6564),
  alt: numParam("alt", 0),
  rangeKm: numParam("rangeKm", 100),
  date: getParam("date", "2026-08-12"),
  centerUtc: getParam("centerUtc", "18:30")
};
const VISOR_PROFILE_CACHE_PREFIX = "horitzo2026:visorProfile:";

function makeVisorProfileCacheKey(lat, lon, alt, rangeKm, dateStr, centerUtc){
  return VISOR_PROFILE_CACHE_PREFIX + [
    lat.toFixed(6),
    lon.toFixed(6),
    Math.round(alt),
    Math.round(rangeKm),
    dateStr,
    centerUtc
  ].join("|");
}

function loadVisorProfileFromCache(){
  try{
    const key = makeVisorProfileCacheKey(
      PARAMS.lat,
      PARAMS.lon,
      PARAMS.alt,
      PARAMS.rangeKm,
      PARAMS.date,
      PARAMS.centerUtc
    );

    const raw = sessionStorage.getItem(key);
    if(!raw) return null;

    const parsed = JSON.parse(raw);
    if(
      !parsed ||
      !Number.isFinite(parsed.az0) ||
      !Number.isFinite(parsed.daz) ||
      !Array.isArray(parsed.alt)
    ){
      return null;
    }

    return parsed;
  }catch(err){
    console.warn("No s'ha pogut llegir la precàrrega del visor", err);
    return null;
  }
}
document.getElementById("backBtn").addEventListener("click", () => {
  const url = new URL("resum.html", location.href);
  url.searchParams.set("lat", PARAMS.lat.toFixed(6));
  url.searchParams.set("lon", PARAMS.lon.toFixed(6));
  url.searchParams.set("alt", String(Math.round(PARAMS.alt)));
  url.searchParams.set("rangeKm", String(Math.round(PARAMS.rangeKm)));
  url.searchParams.set("date", PARAMS.date);
  url.searchParams.set("centerUtc", PARAMS.centerUtc);
  location.href = url.toString();
});
  document.getElementById("newLocBtn").addEventListener("click", () => {
  // torna a la pàgina principal (index)
  const url = new URL("index.html", location.href);
  location.href = url.toString();
});
document.getElementById("compassBtn").addEventListener("click", async () => {
  if(COMPASS_ENABLED){
    disableCompass();
  } else {
    await enableCompass();
  }
});
document.getElementById("simBtn").addEventListener("click", () => {
  if(SIM_MODE === 0) SIM_MODE = 1;
  else if(SIM_MODE === 1) SIM_MODE = 2;
  else SIM_MODE = 0;

  render(
    window.__SUNPTS__,
    window.__MOONPTS__,
    window.__SUNCENTER__,
    window.__SUNMARKS__,
    window.__MOONMARKS__
  );
});

const VIEW = {
  azMin: 220,
  azMax: 300,
  altMin: 0,
  altMax: 25,
  padding: { l: 40, r: 40, t: 14, b: 34 },
  gridAzStep: 10,
  gridAltStep: 5,
  colGrid: "rgba(255,0,180,0.35)",
  colGridBold: "rgba(255,0,180,0.55)",
  colHorizon: "rgba(255,255,255,0.9)",
  colSunPath: "rgba(255,210,40,0.45)",
  colMoonPath: "rgba(70,160,255,0.70)",
  colText: "rgba(255,0,180,0.9)"
};

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let CURRENT_PROFILE = null;
let CURRENT_PROFILE_DISPLAY = null;
let BASE_AZ = null;
let PLOT = null;

let C1_AZ = null;
let PEAK_AZ = null;
let SET_AZ = null;
let SEA_SET_AZ = null;
let LOCAL_SET_AZ = null;
let COMPASS_ENABLED = false;
let DEVICE_HEADING = null;   // graus absoluts 0..360
let DEVICE_ORIENTATION_ACTIVE = false;
let SIM_MODE = 0; // 0 = off, 1 = 29 abril, 2 = 30 abril
let SIM_POINT_29 = null;
let SIM_POINT_30 = null;


function resizeCanvas(){
  const dpr = Math.max(1, window.devicePixelRatio || 1);
  const w = Math.floor(canvas.clientWidth * dpr);
  const h = Math.floor(canvas.clientHeight * dpr);
  if (canvas.width !== w || canvas.height !== h){
    canvas.width = w;
    canvas.height = h;
  }
  return { w, h };
}

function mapX(az){
  const t = (az - VIEW.azMin) / (VIEW.azMax - VIEW.azMin);
  return PLOT.x0 + t * (PLOT.x1 - PLOT.x0);
}

function mapY(alt){
  const tt = (alt - VIEW.altMin) / (VIEW.altMax - VIEW.altMin);
  return PLOT.y0 - tt * (PLOT.y0 - PLOT.y1);
}

function inViewAz(az){ return az >= VIEW.azMin && az <= VIEW.azMax; }
function inViewAlt(alt){ return alt >= VIEW.altMin && alt <= VIEW.altMax; }
function normalize360(deg){
  let x = deg % 360;
  if(x < 0) x += 360;
  return x;
}

function signedAngleDiffDeg(a, b){
  let d = normalize360(a - b);
  if(d > 180) d -= 360;
  return d;
}

function extractHeadingFromEvent(ev){
  // iPhone / Safari
  if(typeof ev.webkitCompassHeading === "number" && Number.isFinite(ev.webkitCompassHeading)){
    return normalize360(ev.webkitCompassHeading);
  }

  // Android i altres navegadors
  if(typeof ev.alpha === "number" && Number.isFinite(ev.alpha)){
    return normalize360(360 - ev.alpha);
  }

  return null;
}

function onDeviceOrientation(ev){
  const heading = extractHeadingFromEvent(ev);
  if(!Number.isFinite(heading)) return;

  if(Number.isFinite(DEVICE_HEADING)){
    const diff = Math.abs(signedAngleDiffDeg(heading, DEVICE_HEADING));
    if(diff < 0.8) return; // ignora canvis molt petits
  }

  DEVICE_HEADING = heading;

  if(
    COMPASS_ENABLED &&
    window.__SUNPTS__ &&
    window.__MOONPTS__ &&
    window.__SUNCENTER__ &&
    window.__SUNMARKS__ &&
    window.__MOONMARKS__
  ){
    render(
      window.__SUNPTS__,
      window.__MOONPTS__,
      window.__SUNCENTER__,
      window.__SUNMARKS__,
      window.__MOONMARKS__
    );
  }
}


async function enableCompass(){
  try{
    if(typeof DeviceOrientationEvent === "undefined"){
      alert("Aquest dispositiu o navegador no suporta la brúixola.");
      return;
    }

    // iPhone/iPad
    if(typeof DeviceOrientationEvent.requestPermission === "function"){
      const response = await DeviceOrientationEvent.requestPermission();
      if(response !== "granted"){
        alert("Permís de brúixola denegat.");
        return;
      }
    }

    if(!DEVICE_ORIENTATION_ACTIVE){
      window.addEventListener("deviceorientation", onDeviceOrientation, true);
      DEVICE_ORIENTATION_ACTIVE = true;
    }

COMPASS_ENABLED = true;

const compassBtn = document.getElementById("compassBtn");
compassBtn.textContent = "Brúixola";
compassBtn.classList.add("active");
compassBtn.setAttribute("aria-pressed", "true");

render(window.__SUNPTS__, window.__MOONPTS__, window.__SUNCENTER__, window.__SUNMARKS__, window.__MOONMARKS__);

  } catch(err){
    console.warn("No s'ha pogut activar la brúixola", err);
    alert("No s'ha pogut activar la brúixola.");
  }
}

function disableCompass(){
COMPASS_ENABLED = false;
DEVICE_HEADING = null;

const compassBtn = document.getElementById("compassBtn");
compassBtn.textContent = "Brúixola";
compassBtn.classList.remove("active");
compassBtn.setAttribute("aria-pressed", "false");

render(window.__SUNPTS__, window.__MOONPTS__, window.__SUNCENTER__, window.__SUNMARKS__, window.__MOONMARKS__);
}

function fillGapsLinear(arr, maxGapSamples = 6){
  const out = arr.slice();
  const n = out.length;
  let i = 0;

  while(i < n){
    if(Number.isFinite(out[i])) { i++; continue; }

    const gapStart = i;
    while(i < n && !Number.isFinite(out[i])) i++;
    const gapEnd = i - 1;

    const left = gapStart - 1;
    const right = i;
    const gapLen = right - left - 1;

    if(
      gapLen > 0 &&
      gapLen <= maxGapSamples &&
      left >= 0 &&
      right < n &&
      Number.isFinite(out[left]) &&
      Number.isFinite(out[right])
    ){
      const v0 = out[left];
      const v1 = out[right];
      const span = right - left;

      for(let k = gapStart; k <= gapEnd; k++){
        const t = (k - left) / span;
        out[k] = v0 + (v1 - v0) * t;
      }
    }
  }

  return out;
}
function smoothProfileForDisplay(arr, windowSize = 5){
  const out = arr.slice();
  const n = arr.length;
  const half = Math.floor(windowSize / 2);

  for(let i = 0; i < n; i++){
    if(!Number.isFinite(arr[i])) continue;

    let sum = 0;
    let count = 0;

    for(let j = i - half; j <= i + half; j++){
      if(j < 0 || j >= n) continue;
      if(!Number.isFinite(arr[j])) continue;

      sum += arr[j];
      count++;
    }

    if(count > 0) out[i] = sum / count;
  }

  return out;
}
function drawSeaLevel(){
  if(!PLOT) return;
  const y = mapY(0);
  ctx.save();
  ctx.strokeStyle = "rgba(255,255,255,0.35)";
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(PLOT.x0, y);
  ctx.lineTo(PLOT.x1, y);
  ctx.stroke();
  ctx.restore();
}
function drawSkyGradient(profile){
  if(!PLOT || !profile) return;

  const { az0, daz, alt } = profile;

  ctx.save();

  const grad = ctx.createLinearGradient(0, 0, 0, PLOT.y0);
  grad.addColorStop(0.00, "#081428");
  grad.addColorStop(0.45, "#163b68");
  grad.addColorStop(0.78, "#3f78a8");
  grad.addColorStop(1.00, "#7fb0d8");

  const pts = [];

  for(let i = 0; i < alt.length; i++){
    const az = az0 + i * daz;
    if(!inViewAz(az)) continue;

    const a = alt[i];
    if(!Number.isFinite(a)) continue;

    pts.push({
      x: mapX(az),
      y: mapY(a)
    });
  }

  if(pts.length < 2){
    ctx.restore();
    return;
  }

  const first = pts[0];
  const last = pts[pts.length - 1];

  ctx.beginPath();
  ctx.moveTo(first.x, 0);
  ctx.lineTo(last.x, 0);
  ctx.lineTo(last.x, last.y);

  for(let i = pts.length - 2; i >= 0; i--){
    ctx.lineTo(pts[i].x, pts[i].y);
  }

  ctx.lineTo(first.x, 0);
  ctx.closePath();

  ctx.fillStyle = grad;
  ctx.fill();

  ctx.restore();
}
function drawGrid(W, H){
  return;
}

function drawHorizon(profile){
  if(!profile) return;
  const { az0, daz, alt } = profile;

  ctx.save();
  ctx.strokeStyle = VIEW.colHorizon;
  ctx.lineWidth = 2.2;
  ctx.beginPath();

  let started = false;

  for(let i = 0; i < alt.length; i++){
    const az = az0 + i * daz;
    if(!inViewAz(az)) continue;

    const a = alt[i];
    if(!Number.isFinite(a)){
      started = false;
      continue;
    }

    const x = mapX(az);
    const y = mapY(a);

    if(!started){
      ctx.moveTo(x, y);
      started = true;
    } else {
      ctx.lineTo(x, y);
    }
  }

  ctx.stroke();
  ctx.restore();
}

function drawSunPath(points, color){
  if(!points || !points.length) return;

  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = 2.0;
  ctx.beginPath();

  let started = false;
  let prev = null;

  for(const p of points){
    const ok = inViewAz(p.az) && inViewAlt(p.alt);
    if(!ok){
      prev = null;
      continue;
    }
    if(prev && Math.abs(p.az - prev.az) > 5) prev = null;

    const x = mapX(p.az);
    const y = mapY(p.alt);

    if(!started || !prev){
      ctx.moveTo(x, y);
      started = true;
    } else {
      ctx.lineTo(x, y);
    }
    prev = p;
  }

  ctx.stroke();
  ctx.restore();
}

function drawSunDiscs(marks){
  if(!marks || !marks.length || !PLOT) return;

  const sunRadiusDeg = 0.266;
  const pxPerDegY = (PLOT.y0 - PLOT.y1) / (VIEW.altMax - VIEW.altMin);
  const rPx = Math.max(3, sunRadiusDeg * pxPerDegY);

  ctx.save();
  ctx.lineWidth = 1.2;
  ctx.font = "bold 40px system-ui";
  ctx.textBaseline = "middle";
  ctx.lineJoin = "round";

  for(const m of marks){
    if(!inViewAz(m.az) || !inViewAlt(m.alt)) continue;

    const x = mapX(m.az);
    const y = mapY(m.alt);

    const col = m.color || "rgba(255,220,80,0.95)";
    ctx.strokeStyle = col;
    ctx.fillStyle = col;

    ctx.beginPath();
    ctx.arc(x, y, rPx, 0, Math.PI * 2);
    ctx.fill();

    ctx.beginPath();
    ctx.arc(x, y, rPx, 0, Math.PI * 2);
    ctx.stroke();

    if(m.label){
      const isMax = !!m.isMax;

      if(isMax){
        ctx.fillStyle = "#ffffff";
        ctx.strokeStyle = "transparent";
        ctx.lineWidth = 0;
      } else {
        ctx.fillStyle = col;
        ctx.strokeStyle = "rgba(0,0,0,0.35)";

function parseDateYMD(s){
  const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(String(s || ""));
  if(!m) return null;
  return { y:+m[1], mo:+m[2], d:+m[3] };
}

function parseHHMM(s){
  const m = /^(\d{1,2}):(\d{2})(?::(\d{2}))?$/.exec(String(s || ""));
  if(!m) return null;

  const hh = +m[1];
  const mm = +m[2];
  const ss = m[3] != null ? +m[3] : 0;

  if(hh < 0 || hh > 23 || mm < 0 || mm > 59 || ss < 0 || ss > 59) return null;
  return { hh, mm, ss };
}

function makeUtcDate(ymd, hhmm){
  return new Date(Date.UTC(
    ymd.y,
    ymd.mo - 1,
    ymd.d,
    hhmm.hh,
    hhmm.mm,
    hhmm.ss || 0
  ));
}

function astroTimeToDate(t){
  if(!t) return null;
  if(t instanceof Date) return t;
  if(t.date instanceof Date) return t.date;
  if(typeof t.toDate === "function") return t.toDate();
  return null;
}

function toAstroTime(x){
  if(!x) return null;
  if (x.time && typeof x.time.ut === "number") return x.time;
  if (typeof x.ut === "number") return x;
  if (x instanceof Date) return Astronomy.MakeTime(x);
  if (x.date instanceof Date) return Astronomy.MakeTime(x.date);
  return null;
}

function buildRealSunPath(observerLat, observerLon, observerAltM, dateYMD, centerHHMM, minutesBefore = 120, minutesAfter = 120, stepSec = 60){
  const obs = new Astronomy.Observer(observerLat, observerLon, observerAltM);

  const centerDate = makeUtcDate(dateYMD, centerHHMM);
  const startMs = centerDate.getTime() - minutesBefore * 60 * 1000;
  const endMs   = centerDate.getTime() + minutesAfter * 60 * 1000;


  const pts = [];
  for(let tMs = startMs; tMs <= endMs; tMs += stepSec * 1000){
    const time = Astronomy.MakeTime(new Date(tMs));
    const eq = Astronomy.Equator("Sun", time, obs, true, true);
    const hor = Astronomy.Horizon(time, obs, eq.ra, eq.dec, "normal");

    let az = hor.azimuth;
    if(az < 0) az += 360;
    if(az >= 360) az -= 360;

    pts.push({ az, alt: hor.altitude, time });
  }
  return pts;
}

function fmtHHMM(x){
  const t = toAstroTime(x);
  const d = astroTimeToDate(t);
  return d ? d.toISOString().slice(11,16) : "—";
}
function fmtLocalHHMMFromDate(d){
  if(!(d instanceof Date)) return "—";
  return new Intl.DateTimeFormat("ca-ES", {
    timeZone: "Europe/Madrid",
    hour: "2-digit",
    minute: "2-digit",
    hour12: false
  }).format(d);
}

function buildSimulationPoint(dateStr, hhmmUtc, obs){
  if(!dateStr || !hhmmUtc || !obs) return null;

  const ymd = parseDateYMD(dateStr);
  const hm = parseHHMM(hhmmUtc);
  if(!ymd || !hm) return null;

  const d = makeUtcDate(ymd, hm);
  const t = Astronomy.MakeTime(d);
  const s = sunHorAtAstroTime(t, obs);
  if(!s) return null;

  return {
    ...s,
    date: d,
    label: `Sim ${fmtLocalHHMMFromDate(d)}`
  };
}

function getActiveSimulationPoint(){
  if(SIM_MODE === 1) return SIM_POINT_29;

}

function sunHorAtAstroTime(x, obs){
  const t = toAstroTime(x);
  if(!t) return null;

  const eq = Astronomy.Equator("Sun", t, obs, true, true);
  const hor = Astronomy.Horizon(t, obs, eq.ra, eq.dec, "normal");

  let az = hor.azimuth;
  if(az < 0) az += 360;
  if(az >= 360) az -= 360;

  return { az, alt: hor.altitude, time: t };
}
function moonHorAtAstroTime(x, obs){
  const t = toAstroTime(x);
  if(!t) return null;

  const eq = Astronomy.Equator("Moon", t, obs, true, true);
  const hor = Astronomy.Horizon(t, obs, eq.ra, eq.dec, "normal");

  let az = hor.azimuth;
  if(az < 0) az += 360;
  if(az >= 360) az -= 360;

  return { az, alt: hor.altitude, time: t };
}

function buildMoonPathBetweenTimes(obs, tStart, tEnd, stepSec = 60){
  const pts = [];
  if(!tStart || !tEnd) return pts;

  const d0 = astroTimeToDate(toAstroTime(tStart));
  const d1 = astroTimeToDate(toAstroTime(tEnd));
  if(!d0 || !d1) return pts;

  const startMs = d0.getTime();
  const endMs   = d1.getTime();

  for(let tMs = startMs; tMs <= endMs; tMs += stepSec * 1000){
    const time = Astronomy.MakeTime(new Date(tMs));
    const eq = Astronomy.Equator("Moon", time, obs, true, true);
    const hor = Astronomy.Horizon(time, obs, eq.ra, eq.dec, "normal");

    let az = hor.azimuth;
    if(az < 0) az += 360;
    if(az >= 360) az -= 360;

    pts.push({ az, alt: hor.altitude, time });
  }
  return pts;
}

function buildSunPathBetweenTimes(obs, tStart, tEnd, stepSec = 60){
  const pts = [];
  if(!tStart || !tEnd) return pts;

  const d0 = astroTimeToDate(toAstroTime(tStart));
  const d1 = astroTimeToDate(toAstroTime(tEnd));
  if(!d0 || !d1) return pts;

  const startMs = d0.getTime();
  const endMs   = d1.getTime();

  for(let tMs = startMs; tMs <= endMs; tMs += stepSec * 1000){
    const time = Astronomy.MakeTime(new Date(tMs));
    const eq = Astronomy.Equator("Sun", time, obs, true, true);
    const hor = Astronomy.Horizon(time, obs, eq.ra, eq.dec, "normal");

    let az = hor.azimuth;
    if(az < 0) az += 360;
    if(az >= 360) az -= 360;

    pts.push({ az, alt: hor.altitude, time });
  }
  return pts;
}

function findSeaLevelSetFromSunPts(points){
  for(let i = 1; i < points.length; i++){
    const p0 = points[i - 1], p1 = points[i];
    if(!p0 || !p1) continue;
    if(!Number.isFinite(p0.alt) || !Number.isFinite(p1.alt)) continue;
    if(!Number.isFinite(p0.az) || !Number.isFinite(p1.az)) continue;

    if(p0.alt > 0 && p1.alt <= 0){
      const f = p0.alt / (p0.alt - p1.alt);
      const az = p0.az + f * (p1.az - p0.az);

      let time = null;
      if(p0.time && p1.time){
        const d0 = astroTimeToDate(p0.time);
        const d1 = astroTimeToDate(p1.time);
        if(d0 && d1){
          time = new Date(d0.getTime() + f * (d1.getTime() - d0.getTime()));
        }
      }
      return { az, alt: 0, time };
    }
  }
  return null;
}

function profileAltAtAz(profile, azDeg){
  if(!profile || !profile.alt || !Number.isFinite(profile.az0) || !Number.isFinite(profile.daz)) return NaN;

  const arr = profile.alt;
  const f = (azDeg - profile.az0) / profile.daz;
  if(!Number.isFinite(f)) return NaN;

  const i0 = Math.floor(f);
  const i1 = i0 + 1;
  if(i0 < 0 || i1 >= arr.length) return NaN;

  const v0 = arr[i0];
  const v1 = arr[i1];
  if(!Number.isFinite(v0) || !Number.isFinite(v1)) return NaN;

  const t = f - i0;
  return v0 + (v1 - v0) * t;
}

function evaluateVisibilityFromProfile(profile, azDeg, altSolDeg){
  const hHor = profileAltAtAz(profile, azDeg);

  if(!Number.isFinite(hHor)){
    return { h_crit: NaN, altSol: altSolDeg, visible: null, delta: null };
  }

  const delta = altSolDeg - hHor;
  const visible = delta > 0;
  return { h_crit: hHor, altSol: altSolDeg, visible, delta };
}
function findLocalSetFromProfile(points, profile){
  if(!points || !points.length || !profile) return null;

  const SUN_R_DEG = 0.266;
  let prev = null;

  for(const p of points){
    if(!p || !Number.isFinite(p.az) || !Number.isFinite(p.alt)) continue;

    const hHor = profileAltAtAz(profile, p.az);
    if(!Number.isFinite(hHor)) continue;

    const cur = {
      az: p.az,
      alt: p.alt,
      time: p.time,
      delta: (p.alt + SUN_R_DEG) - hHor,
      hHor
    };

    if(prev && prev.delta > 0 && cur.delta <= 0){
      const f = prev.delta / (prev.delta - cur.delta);

      const az = prev.az + f * (cur.az - prev.az);
      const alt = prev.alt + f * (cur.alt - prev.alt);
      const hHorInterp = prev.hHor + f * (cur.hHor - prev.hHor);

      let time = null;
      const d0 = astroTimeToDate(prev.time);
      const d1 = astroTimeToDate(cur.time);
      if(d0 && d1){
        time = Astronomy.MakeTime(new Date(d0.getTime() + f * (d1.getTime() - d0.getTime())));
      }

      return { az, alt, time, hHor: hHorInterp };
    }

    prev = cur;
  }

  return null;
}

  const availH = H - VIEW.padding.t - VIEW.padding.b;
  const altSpan = VIEW.altMax - VIEW.altMin;

const sideMarginAz = 0.8;

const leftBaseAz = Number.isFinite(C1_AZ)
  ? C1_AZ
  : (BASE_AZ && Number.isFinite(BASE_AZ.min) ? BASE_AZ.min : 220);

const rightBaseAz = Number.isFinite(SET_AZ)
  ? SET_AZ
  : Number.isFinite(SEA_SET_AZ)
    ? SEA_SET_AZ
    : (BASE_AZ && Number.isFinite(BASE_AZ.max) ? BASE_AZ.max : 300);

const leftAz = leftBaseAz - sideMarginAz;
const rightAz = rightBaseAz + sideMarginAz;

  const midAz = (leftAz + rightAz) / 2;
  const marginLayoutAz = 1.0;
  const needAzSpan = Math.abs(rightAz - leftAz) + 2 * marginLayoutAz;

  const pxPerDeg = Math.min(
    availH / altSpan,
    availW / needAzSpan
  );

  VIEW.azMin = midAz - needAzSpan / 2;
  VIEW.azMax = midAz + needAzSpan / 2;

  const realPlotW = pxPerDeg * needAzSpan;
  const realPlotH = pxPerDeg * altSpan;

  const extraX = (availW - realPlotW) / 2;
  const extraY = (availH - realPlotH) / 2;

  PLOT = {
    x0: VIEW.padding.l + extraX,

if(ECL && ECL.peak && ECL.peak.time){
  const pm = moonHorAtAstroTime(ECL.peak.time, OBS);
  if(pm) moonMarks.push({ ...pm, color: "rgba(0,0,0,0.98)" });
}

if(ECL && ECL.peak && ECL.peak.time){
  const ps = sunHorAtAstroTime(ECL.peak.time, OBS);
  if(ps) sunMarks.push({
    ...ps,
    label: `Màxim ${fmtHHMM(ECL.peak.time)}`,
    labelPos: "right",
    color: "rgba(255,220,80,0.95)",
    isMax: true
  });
}

if(sunSetTime && sunSetTime.time){
  const ps = sunHorAtAstroTime(sunSetTime.time, OBS);
  const pm = moonHorAtAstroTime(sunSetTime.time, OBS);

  if(ps) sunMarks.push({
    ...ps,
    label: `Posta de sol ${fmtHHMM(sunSetTime.time)}`,
    labelPos: "left",
    color: "rgba(255,150,120,0.95)"
  });

  if(pm) moonMarks.push({ ...pm, color: "rgba(70,160,255,0.95)" });
}

    C1_AZ = (c1Pt && Number.isFinite(c1Pt.az)) ? c1Pt.az : null;
    PEAK_AZ = (peakPt && Number.isFinite(peakPt.az)) ? peakPt.az : null;
    SET_AZ = (sunSetPt && Number.isFinite(sunSetPt.az)) ? sunSetPt.az : null;

    const marginLayoutAz = 1.0;
    let azMinBase = (C1_AZ != null) ? (C1_AZ - marginLayoutAz) : 220;
    let azMaxBase = (SET_AZ != null) ? (SET_AZ + marginLayoutAz) : 300;

    if (!Number.isFinite(azMinBase) || !Number.isFinite(azMaxBase) || (azMaxBase - azMinBase) < 5) {
      azMinBase = 220;
      azMaxBase = 300;
    }

    BASE_AZ = { min: azMinBase, max: azMaxBase };

    if ((BASE_AZ.max - BASE_AZ.min) < 10) {
      const mid = (BASE_AZ.min + BASE_AZ.max) / 2;
      BASE_AZ.min = mid - 5;
      BASE_AZ.max = mid + 5;
    }

    window.__SUNPTS__ = sunPts;
    window.__MOONPTS__ = moonPts;
    window.__SUNCENTER__ = sunAtCenter;
    window.__SUNMARKS__ = sunMarks;
    window.__MOONMARKS__ = moonMarks;
    
const cachedProfile = loadVisorProfileFromCache();
if(cachedProfile){
  CURRENT_PROFILE = {
    az0: cachedProfile.az0,
    daz: cachedProfile.daz,
    alt: cachedProfile.alt
  };

  CURRENT_PROFILE_DISPLAY = {
    az0: cachedProfile.az0,
    daz: cachedProfile.daz,
    alt: Array.isArray(cachedProfile.altDisplay) ? cachedProfile.altDisplay : cachedProfile.alt
  };

  const localSetPt = findLocalSetFromProfile(sunPts, CURRENT_PROFILE);
  LOCAL_SET_AZ = (localSetPt && Number.isFinite(localSetPt.az)) ? localSetPt.az : null;
if(localSetPt){
  sunMarks.push({
    az: localSetPt.az,
    alt: localSetPt.alt,
    time: localSetPt.time,
    label: `Posta de sol ${fmtHHMM(localSetPt.time)}`,
    labelPos: "left",
    color: "rgba(255,120,120,0.95)"
  });
}

  render(sunPts, moonPts, sunAtCenter, sunMarks, moonMarks);
  return;
}

    const fallbackMin = 260.0;
    const fallbackMax = 300.0;
    const margin = 1.0;

    const dynMin = (BASE_AZ && Number.isFinite(BASE_AZ.min)) ? BASE_AZ.min : fallbackMin;
    const dynMax = (BASE_AZ && Number.isFinite(BASE_AZ.max)) ? BASE_AZ.max : fallbackMax;

    const azMin = dynMin - margin;
    const azMax = dynMax + margin;

  const centerAzDeg = (azMin + azMax) / 2;
const fovDeg = Math.max(4, azMax - azMin);
const samples = Math.max(420, Math.ceil(fovDeg * 18));

    const result = await engine.computeProfile({
      lat: PARAMS.lat,
      lon: PARAMS.lon,
      observerAltM: Number.isFinite(PARAMS.alt) ? PARAMS.alt : null,
      centerAzDeg,
      fovDeg,
      samples,
      maxDistM: Math.max(20000, Math.min(200000, (PARAMS.rangeKm || 100) * 1000)),
      onProgress: (p) => {
      }
    });

   CURRENT_PROFILE = {
  az0: result.az0,
  daz: result.daz,
  alt: Array.from(result.alt)
};

// perfil real: només omplim petits forats
CURRENT_PROFILE.alt = fillGapsLinear(CURRENT_PROFILE.alt, 6);

// perfil només per dibuixar: suavitza la línia visual
CURRENT_PROFILE_DISPLAY = {
  az0: CURRENT_PROFILE.az0,
  daz: CURRENT_PROFILE.daz,
  alt: smoothProfileForDisplay(CURRENT_PROFILE.alt, 5)
};

const localSetPt = findLocalSetFromProfile(sunPts, CURRENT_PROFILE);
LOCAL_SET_AZ = (localSetPt && Number.isFinite(localSetPt.az)) ? localSetPt.az : null;
if(localSetPt){
  sunMarks.push({
    az: localSetPt.az,
    alt: localSetPt.alt,
    time: localSetPt.time,
    label: `Posta de sol ${fmtHHMM(localSetPt.time)}`,
    labelPos: "left",
    color: "rgba(255,120,120,0.95)"
  });
}
render(sunPts, moonPts, sunAtCenter, sunMarks, moonMarks);

} catch(e) {
  console.warn("Error carregant horitzó online", e);
  CURRENT_PROFILE = null;
  CURRENT_PROFILE_DISPLAY = null;
  if(window.__SUNPTS__ && window.__MOONPTS__ && window.__SUNCENTER__ && window.__SUNMARKS__ && window.__MOONMARKS__){
    render(window.__SUNPTS__, window.__MOONPTS__, window.__SUNCENTER__, window.__SUNMARKS__, window.__MOONMARKS__);
  }
}
})();
</script>
